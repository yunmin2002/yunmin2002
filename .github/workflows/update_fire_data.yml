name: Update Fire Data

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch 산림청 산불발생통계
        env:
          FOREST_FIRE_API_KEY: ${{ secrets.FOREST_FIRE_API_KEY }}
        run: python crawling/fetch_forest_fire.py

      - name: Fetch NASA FIRMS data (보조)
        run: python crawling/fetch_firms_data.py

      - name: Merge fire data
        run: python crawling/merge_fire_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/korea_fires.json data/forest_fires.json data/firms_fires.json data/geocode_cache.json
          git diff --staged --quiet \
            || git commit -m "chore: 화점 데이터 자동 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
