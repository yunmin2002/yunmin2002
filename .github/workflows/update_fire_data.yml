name: Update Fire Data

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NASA FIRMS data
        env:
          FIRMS_API_KEY: ${{ secrets.FIRMS_API_KEY }}
        run: python crawling/fetch_firms_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/korea_fires.json
          git diff --staged --quiet \
            || git commit -m "chore: 화점 데이터 자동 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
